<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexcent</title>
    <link rel="stylesheet" href="/style.css" />
    <link
      rel="icon"
      type="image/png"
      href="/assets/Favicon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="/assets/Favicon/favicon.svg" />
    <link rel="shortcut icon" href="/assets/Favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/Favicon/apple-touch-icon.png"
    />
    <link rel="manifest" href="/assets/Favicon/site.webmanifest" />
  </head>
  <body>
    <header class="topnav">
      <div class="wrapper topnav__wrapper">
        <a href="/" class="topnav__homelink">
          <img
            src="/assets/Images/logo/Logo.svg"
            alt="Nexcent Homepage"
            class="topnav__logo"
            width="155"
            height="24"
        /></a>
        <nav>
          <ul class="topnav__links">
            <li class="topnav__item">
              <a href="" class="topnav__link">Home</a>
            </li>
            <li class="topnav__item">
              <a href="" class="topnav__link">Service</a>
            </li>
            <li class="topnav__item">
              <a href="" class="topnav__link">Feature</a>
            </li>
            <li class="topnav__item">
              <a href="" class="topnav__link">Product</a>
            </li>
            <li class="topnav__item">
              <a href="" class="topnav__link">Testimonial</a>
            </li>
            <li class="topnav__item">
              <a href="" class="topnav__link">FAQ</a>
            </li>
          </ul>
        </nav>
        <div class="topnav__buttons">
          <a href="" class="topnav__login">Login</a>
          <a href="" class="button">Sign Up</a>
        </div>
      </div>
    </header>
    <main>
      <section class="hero">
        <div class="wrapper hero__wrapper">
          <img
            class="hero__image"
            src="/assets/Images/illustration/Illustration.svg"
            alt="a web developer starring at a laptop, building a site"
            width="391"
            height="407"
          />
          <div class="hero__text">
            <h1 class="hero__title">
              Lessons and insights
              <span class="hero__title-highlight">from 8 years</span>
            </h1>
            <p class="hero__content">
              Where to grow your business as a photographer: site or social
              media?
            </p>
            <a class="button" href="">Register</a>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer"></footer>
  </body>
</html>
